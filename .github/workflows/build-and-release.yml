name: Build and Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore WPFDemo/WPFDemo.csproj

    - name: Build
      run: dotnet build WPFDemo/WPFDemo.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish WPFDemo/WPFDemo.csproj --configuration Release --output ./publish --no-build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WPFDemo-Build
        path: ./publish

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore WPFDemo/WPFDemo.csproj

    - name: Build
      run: dotnet build WPFDemo/WPFDemo.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish WPFDemo/WPFDemo.csproj --configuration Release --output ./release --no-build

    - name: Create ZIP Archive
      run: Compress-Archive -Path ./release/* -DestinationPath CyberbotChat-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: CyberbotChat-${{ github.ref_name }}.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
