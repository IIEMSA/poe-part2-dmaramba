name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

    - name: Publish
      run: dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }} --output ./publish --no-build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Build-${{ github.sha }}
        path: ./publish

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

    - name: Publish
      run: dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }} --output ./release --no-build

    - name: Get project name
      id: project
      run: |
        $projectName = (Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1).BaseName
        echo "name=$projectName" >> $env:GITHUB_OUTPUT

    - name: Create ZIP Archive
      run: Compress-Archive -Path ./release/* -DestinationPath ${{ steps.project.outputs.name }}-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.project.outputs.name }}-${{ github.ref_name }}.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
